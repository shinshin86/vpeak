name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.20"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X main.version=${TAG}" -o "dist/vpeak${{ matrix.ext }}" ./cmd/vpeak

      - name: Package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p dist/pkg
          if [ "${GOOS}" = "windows" ]; then
            zip -j "dist/pkg/vpeak_${TAG}_${GOOS}_${GOARCH}.zip" "dist/vpeak.exe"
          else
            tar -czf "dist/pkg/vpeak_${TAG}_${GOOS}_${GOARCH}.tar.gz" -C dist "vpeak"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vpeak-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/pkg/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          ls -la

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
            dist/checksums.txt
          fail_on_unmatched_files: true
